# ---------------------------------------------------------------------------
# Build & publish the e-golem multi-arch container image
# ---------------------------------------------------------------------------
# Triggers on pushes to main that touch golem source, and on tags.
# Publishes to GitHub Container Registry (ghcr.io/e-work/golem).
# Builds for linux/amd64 and linux/arm64.
# ---------------------------------------------------------------------------

name: Golem Container Image

on:
  push:
    branches: [main]
    paths:
      - 'packages/server/src/golem/**'
      - 'packages/shared/src/golem-headless.ts'
      - 'Dockerfile.golem'
      - '.github/workflows/golem-image.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'packages/server/src/golem/**'
      - 'packages/shared/src/golem-headless.ts'
      - 'Dockerfile.golem'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: e-work/golem

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.golem
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size
        if: github.event_name != 'pull_request'
        run: |
          # Pull the amd64 image and check its compressed size
          docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
          SIZE=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null | \
            python3 -c "import sys,json; m=json.load(sys.stdin); print(sum(l.get('size',0) for l in m.get('manifests',[]) for l in [l.get('platform',{})] if l.get('architecture','')=='amd64') if 'manifests' in m else 'unknown')" 2>/dev/null || echo "unknown")
          echo "Image size check: ${SIZE}"
          echo "Note: Target is <200MB compressed per architecture"
