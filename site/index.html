<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E — AI-powered desktop IDE</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="hero">
        <h1>E</h1>
        <p class="tagline">A desktop AI assistant powered by Claude</p>
      </div>
    </header>

    <main>
      <div class="container">
        <!-- Recommended download (hero) -->
        <section id="recommended" class="hero-download" hidden>
          <p class="detected">Detected: <strong id="detected-os">your platform</strong></p>
          <a id="primary-download" class="btn btn-primary" href="#">Download</a>
          <p id="primary-meta" class="version-meta"></p>
        </section>

        <section id="loading" class="hero-download">
          <p>Loading the latest release…</p>
        </section>

        <!-- All downloads grid (populated from GitHub Releases) -->
        <section id="all-downloads" hidden>
          <h2>All Platforms</h2>
          <div class="download-grid">
            <!-- Linux -->
            <div class="download-card" data-platform="linux">
              <div class="platform-icon">🐧</div>
              <h3>Linux</h3>
              <div class="downloads">
                <a class="download-link" data-artifact="standalone-linux" href="#">
                  <span class="format">Standalone</span><span class="size"></span>
                </a>
                <a class="download-link" data-artifact="deb" href="#">
                  <span class="format">.deb</span><span class="size"></span>
                </a>
                <a class="download-link" data-artifact="rpm" href="#">
                  <span class="format">.rpm</span><span class="size"></span>
                </a>
              </div>
            </div>

            <!-- macOS (Apple Silicon only) -->
            <div class="download-card" data-platform="macos">
              <div class="platform-icon">🍎</div>
              <h3>macOS</h3>
              <div class="downloads">
                <a class="download-link" data-artifact="standalone-darwin-arm64" href="#">
                  <span class="format">Apple Silicon</span><span class="size"></span>
                </a>
                <a class="download-link" data-artifact="dmg" href="#">
                  <span class="format">.dmg</span><span class="size"></span>
                </a>
              </div>
            </div>

            <!-- Windows -->
            <div class="download-card" data-platform="windows">
              <div class="platform-icon">🪟</div>
              <h3>Windows</h3>
              <div class="downloads">
                <a class="download-link" data-artifact="standalone-windows" href="#">
                  <span class="format">Standalone</span><span class="size"></span>
                </a>
                <a class="download-link" data-artifact="exe" href="#">
                  <span class="format">.exe</span><span class="size"></span>
                </a>
                <a class="download-link" data-artifact="msi" href="#">
                  <span class="format">.msi</span><span class="size"></span>
                </a>
              </div>
            </div>
          </div>
        </section>

        <p class="repo-link">
          Or browse all releases on
          <a href="https://github.com/airgap/E/releases">GitHub</a>.
        </p>
      </div>
    </main>

    <footer>
      <div class="container">
        <p><a href="https://github.com/airgap/E">GitHub</a> · MIT License</p>
      </div>
    </footer>

    <script>
      // Downloads come straight from GitHub Releases (latest stable, which
      // excludes prereleases). No backend / R2 manifest needed.
      const REPO = 'airgap/E';
      const LATEST_API = `https://api.github.com/repos/${REPO}/releases/latest`;
      const RELEASES_PAGE = `https://github.com/${REPO}/releases`;

      // Map each download-link's data-artifact to a matcher against the GitHub
      // release asset filename. Standalone archives are named
      // e-<platform>-<arch>.(tar.gz|zip); installers keep their native ext.
      // macOS is Apple Silicon (arm64) only — no Intel/x64 builds.
      const ARTIFACT_MATCHERS = {
        deb: (n) => n.endsWith('.deb'),
        rpm: (n) => n.endsWith('.rpm'),
        'standalone-linux': (n) => /e-linux-x64\.tar\.gz$/.test(n),
        dmg: (n) => n.endsWith('.dmg'),
        'standalone-darwin-arm64': (n) => /e-darwin-arm64\.tar\.gz$/.test(n),
        exe: (n) => n.endsWith('.exe'),
        msi: (n) => n.endsWith('.msi'),
        'standalone-windows': (n) => /e-windows-x64\.zip$/.test(n),
      };

      // Preferred artifact per platform for the big "recommended" button.
      const RECOMMENDED_ARTIFACT = {
        linux: ['standalone-linux', 'deb'],
        macos: ['standalone-darwin-arm64', 'dmg'],
        windows: ['standalone-windows', 'exe', 'msi'],
      };

      const PLATFORM_LABELS = { linux: 'Linux', macos: 'macOS', windows: 'Windows' };

      function detectPlatform() {
        const ua = navigator.userAgent.toLowerCase();
        if (ua.includes('win')) return 'windows';
        if (ua.includes('mac')) return 'macos';
        if (ua.includes('linux') || ua.includes('x11')) return 'linux';
        return null;
      }

      function formatSize(bytes) {
        if (!bytes) return '';
        const mb = bytes / (1024 * 1024);
        return mb >= 1 ? `${mb.toFixed(1)} MB` : `${(bytes / 1024).toFixed(0)} KB`;
      }

      const platform = detectPlatform();

      async function loadReleases() {
        const loadingEl = document.getElementById('loading');
        try {
          const res = await fetch(LATEST_API, {
            headers: { Accept: 'application/vnd.github+json' },
          });
          if (!res.ok) throw new Error(`GitHub API ${res.status}`);
          const release = await res.json();
          renderDownloads(release);
        } catch (err) {
          loadingEl.innerHTML = `<p class="error">Could not load downloads. Visit <a href="${RELEASES_PAGE}">GitHub Releases</a>.</p>`;
          console.error(err);
        }
      }

      function findAsset(assets, artifact) {
        const match = ARTIFACT_MATCHERS[artifact];
        if (!match) return null;
        return assets.find((a) => match(a.name)) || null;
      }

      function renderDownloads(release) {
        const assets = release.assets || [];
        document.getElementById('loading').hidden = true;
        document.getElementById('all-downloads').hidden = false;

        document.querySelectorAll('.download-link').forEach((link) => {
          const asset = findAsset(assets, link.dataset.artifact);
          const sizeEl = link.querySelector('.size');
          if (asset) {
            link.href = asset.browser_download_url;
            if (sizeEl) sizeEl.textContent = formatSize(asset.size);
          } else {
            link.classList.add('unavailable');
            link.removeAttribute('href');
            if (sizeEl) sizeEl.textContent = 'Coming soon';
          }
        });

        // Highlight the detected platform's card.
        const card = document.querySelector(`.download-card[data-platform="${platform}"]`);
        if (card) card.classList.add('current-platform');

        // Recommended (hero) download for the detected platform.
        if (platform) {
          for (const artifact of RECOMMENDED_ARTIFACT[platform] || []) {
            const asset = findAsset(assets, artifact);
            if (asset) {
              document.getElementById('detected-os').textContent = PLATFORM_LABELS[platform];
              const reco = document.getElementById('primary-download');
              reco.href = asset.browser_download_url;
              reco.textContent = `Download for ${PLATFORM_LABELS[platform]}`;
              document.getElementById('primary-meta').textContent =
                `${formatSize(asset.size)} · ${release.tag_name || ''}`;
              document.getElementById('recommended').hidden = false;
              break;
            }
          }
        }
      }

      loadReleases();
    </script>
  </body>
</html>
