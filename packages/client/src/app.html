<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="AI assistant powered by Claude" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="E" />
    <meta name="theme-color" content="#0c0b0a" />
    <title>E</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-maskable.svg" />
    <script>
      // Set --bg-primary from saved theme BEFORE first paint so splash isn't grey.
      // This is the static-app equivalent of SSR — must stay synchronous in <head>.
      try {
        var s = JSON.parse(localStorage.getItem('e-settings') || '{}');
        var t = s.theme || 'hearth';
        var bg = {
          // Standard themes
          dark: '#040810',
          light: '#e8eef2',
          'dark-colorblind': '#040810',
          'light-colorblind': '#e8eef2',
          'dark-ansi': '#000000',
          'light-ansi': '#f0f0f0',
          monokai: '#272822',
          dracula: '#282a36',
          nord: '#2e3440',
          'gruvbox-dark': '#282828',
          'gruvbox-light': '#fbf1c7',
          'solarized-dark': '#002b36',
          'solarized-light': '#fdf6e3',
          'catppuccin-mocha': '#1e1e2e',
          'catppuccin-latte': '#eff1f5',
          'tokyo-night': '#1a1b26',
          'rose-pine': '#191724',
          'rose-pine-dawn': '#faf4ed',
          synthwave: '#262335',
          'github-dark': '#0d1117',
          'github-light': '#ffffff',
          'one-dark': '#282c34',
          everforest: '#2d353b',
          sakura: '#1a1017',
          'sakura-light': '#fdf6f9',
          'high-contrast': '#000000',
          'high-contrast-light': '#ffffff',
          // Immersive themes
          hearth: '#0c0b0a',
          arcane: '#0a0612',
          ethereal: '#08090f',
          astral: '#020817',
          'astral-midnight': '#000000',
          study: '#110d14',
          goth: '#080808',
          'magic-forest': '#070d08',
        }[t];
        var accent = {
          dark: '#00b4ff',
          light: '#006aaa',
          'dark-colorblind': '#00b4ff',
          'light-colorblind': '#006aaa',
          'dark-ansi': '#00aaff',
          'light-ansi': '#0044aa',
          monokai: '#f92672',
          dracula: '#bd93f9',
          nord: '#88c0d0',
          'gruvbox-dark': '#fe8019',
          'gruvbox-light': '#af3a03',
          'solarized-dark': '#268bd2',
          'solarized-light': '#268bd2',
          'catppuccin-mocha': '#cba6f7',
          'catppuccin-latte': '#8839ef',
          'tokyo-night': '#7aa2f7',
          'rose-pine': '#c4a7e7',
          'rose-pine-dawn': '#907aa9',
          synthwave: '#ff7edb',
          'github-dark': '#58a6ff',
          'github-light': '#0969da',
          'one-dark': '#61afef',
          everforest: '#a7c080',
          goth: '#8b0000',
          cosmic: '#60a5fa',
          sakura: '#f9a8c0',
          'sakura-light': '#d45090',
          'high-contrast': '#66ccff',
          'high-contrast-light': '#0055aa',
          hearth: '#e2733f',
          arcane: '#22d3ee',
          ethereal: '#7dd3c0',
          astral: '#60a5fa',
          'astral-midnight': '#60a5fa',
          study: '#e4a03c',
          'magic-forest': '#50c878',
        }[t];
        // Expose accent for the splash canvas tint script below
        window.__splashAccent = accent || '#00b4ff';
        if (bg) {
          document.documentElement.style.setProperty('--bg-primary', bg);
          // Inject a literal-color rule for #splash at higher specificity (0-1-1
          // beats the inline <style>'s 0-1-0). This makes the splash immune to
          // any later JS that clears/resets --bg-primary during hydration.
          var st = document.createElement('style');
          st.id = 'splash-theme';
          st.textContent = 'html #splash{background-color:' + bg + '}';
          document.head.appendChild(st);
        }
        if (accent) {
          document.documentElement.style.setProperty('--accent-primary', accent);
        }
      } catch (e) {}

      // Register service worker for PWA (install prompt + offline support)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
    <style>
      /* Splash screen — renders immediately, before any JS */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary, #0a0a0a);
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }
      #splash::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at center,
            color-mix(in srgb, var(--accent-primary, #00b4ff) 12%, transparent) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at center,
            color-mix(in srgb, var(--accent-primary, #00b4ff) 5%, transparent) 0%,
            transparent 70%
          );
        pointer-events: none;
      }
      #splash.dismissed {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- Splash screen: E logo centered, visible instantly -->
    <div id="splash">
      <canvas id="splash-e" width="128" height="128" style="width: 128px; height: 128px"></canvas>
    </div>
    <script>
      // Animate E sprite as a loading indicator — loops until app is ready
      (function () {
        var canvas = document.getElementById('splash-e');
        var ctx = canvas && canvas.getContext('2d');
        if (!ctx) return;
        var img = new Image();
        img.src = '/E.png';
        var frame = 0,
          total = 11,
          fw = 32,
          fh = 32,
          dir = 1;
        ctx.imageSmoothingEnabled = false;
        img.onload = function () {
          var accent = window.__splashAccent || '#00b4ff';
          function draw() {
            ctx.clearRect(0, 0, 128, 128);
            ctx.drawImage(img, frame * fw, 0, fw, fh, 0, 0, 128, 128);
            // Tint with theme accent
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = accent;
            ctx.fillRect(0, 0, 128, 128);
            ctx.globalCompositeOperation = 'source-over';
          }
          draw();
          var iv = setInterval(function () {
            if (window.__splashReady) {
              // App ready — advance to final frame and stop
              if (frame < total - 1) {
                frame++;
              } else {
                clearInterval(iv);
              }
            } else {
              // Ping-pong loop while loading
              frame += dir;
              if (frame >= total - 1) {
                frame = total - 1;
                dir = -1;
              } else if (frame <= 0) {
                frame = 0;
                dir = 1;
              }
            }
            draw();
          }, 70);
        };
      })();
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
